<!-- Bridge: move inline config into window.TRIPMAP_CONFIG before the bundle loads -->
<script>
  (function () {
    var el = document.getElementById('trip-config');
    if (!el) return;
    try {
      var cfg = JSON.parse(el.textContent || "{}");
      window.TRIPMAP_CONFIG = {
        MAPTILER_KEY: (cfg.maptiler && cfg.maptiler.key) || "",
        MAP_ID: (cfg.maptiler && cfg.maptiler.mapId) || "landscape"
      };
      // stash full config for the bundle to read from inline (no fetch)
      window.__TRIP_INLINE_CONFIG__ = cfg;
    } catch (e) { }
  })();
</script>
